<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Weather</title>
</head>

<body>

<header>
  <h1>World Weather</h1>

  <!-- top internal links -->
  <nav>
    <a href="#africa">Africa</a> |
    <a href="#australia">Australia</a> |
    <a href="#south-america">South America</a>
  </nav>
</header>

<main>
  <!-- image -->
  <img src="images/weather.jpg" alt="Weather image" style="max-width:100%; height:auto;">

  <!-- CSS table layout -->
  <div style="display: table; width: 100%; margin-top: 20px;">

    <!-- Africa -->
    <div style="display: table-row;">
      <div style="display: table-cell; padding: 10px;">
        <h2 id="africa">Africa</h2>
      </div>
      <div style="display: table-cell; padding: 10px;">
        <a href="https://www.bbc.com/weather/993800" target="_blank">Johannesburg</a><br>
        <a href="https://www.bbc.com/weather/360630" target="_blank">Cairo</a>
      </div>
    </div>

    <!-- Australia -->
    <div style="display: table-row;">
      <div style="display: table-cell; padding: 10px;">
        <h2 id="australia">Australia</h2>
      </div>
      <div style="display: table-cell; padding: 10px;">
        <a href="https://www.bbc.com/weather/2147714" target="_blank">Sydney</a><br>
        <a href="https://www.bbc.com/weather/7839805" target="_blank">Melbourne</a>
      </div>
    </div>

    <!-- South America -->
    <div style="display: table-row;">
      <div style="display: table-cell; padding: 10px;">
        <h2 id="south-america">South America</h2>
      </div>
      <div style="display: table-cell; padding: 10px;">
        <a href="https://www.bbc.com/weather/3451190" target="_blank">Rio de Janeiro</a><br>
        <a href="https://www.bbc.com/weather/3435910" target="_blank">Buenos Aires</a>
      </div>
    </div>

  </div>
</main>

<footer>
  <p>Chapter 6 Project</p>
</footer>

</body>
</html>
