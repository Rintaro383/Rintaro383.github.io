<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Equestrian Center</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            font-family: Arial, sans-serif;
        }

        caption {
            font-size: 1.5em;
            font-weight: bold;
            padding: 20px;
            caption-side: top;
        }

        th, td {
            border: 1px solid #000;
            padding: 12px;
            text-align: left;
        }

        thead {
            background-color: #f2f2f2;
        }

        th {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <table>
        <caption>Park Equestrian Center - Lesson Schedule</caption>
        <thead>
            <tr>
                <th>Day</th>
                <th>Time</th>
                <th>Instructor</th>
                <th>Level</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Monday</td>
                <td>4:00 PM</td>
                <td>Sarah Jenkins</td>
                <td>Beginner</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td>5:30 PM</td>
                <td>Mike Thompson</td>
                <td>Intermediate</td>
            </tr>
            <tr>
                <td>Friday</td>
                <td>4:00 PM</td>
                <td>Sarah Jenkins</td>
                <td>Advanced</td>
            </tr>
            <tr>
                <td>Saturday</td>
                <td>10:00 AM</td>
                <td>Emily Reed</td>
                <td>All Levels</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
