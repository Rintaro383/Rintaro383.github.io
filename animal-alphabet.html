<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal Alphabet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ff6b6b'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fffbe6;
      margin: 0;
    }

    #top {
      background-color: #ff6b6b;
      padding: 20px;
      text-align: center;
    }

    #top h1 {
      font-family: 'Fredoka One', cursive;
      color: white;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    nav a {
      font-family: 'Fredoka One', cursive;
      font-size: 1.8em;
      color: white;
      text-decoration: none;
      padding: 5px 12px;
    }

    nav a:hover {
      background-color: rgba(255,255,255,0.3);
      border-radius: 8px;
    }

    nav span {
      color: white;
      font-size: 1.8em;
    }

    .animal-section {
      padding: 40px;
      border-bottom: 2px dashed #ddd;
    }

    .animal-section h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5em;
      color: #ff6b6b;
      margin-bottom: 15px;
    }

    .animal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
      align-items: center;
    }

    .animal-grid p {
      font-size: 1.3em;
      font-weight: bold;
      text-align: center;
    }

    .animal-grid img {
      width: 100%;
      border-radius: 10px;
    }

    .animal-grid div {
      text-align: center;
    }

    #back-to-top {
      text-align: center;
      padding: 30px;
      background-color: #ff6b6b;
    }

    #back-to-top a {
      font-family: 'Fredoka One', cursive;
      font-size: 1.3em;
      color: white;
      text-decoration: none;
    }

    #back-to-top a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="top">
    <h1>Animal Alphabet</h1>
    <nav>
      <a href="#A">A</a><span> | </span>
      <a href="#B">B</a><span> | </span>
      <a href="#C">C</a><span> | </span>
      <a href="#D">D</a><span> | </span>
      <a href="#E">E</a>
    </nav>
  </div>

  <section class="animal-section" id="A">
    <h2>A - Alligator</h2>
    <div class="animal-grid">
      <p>Alligator</p>
      <img src="https://rintaro383.github.io/alligator.jpg" alt="Alligator">
      <div>
        <p>Listen to an alligator!</p>
        <audio controls>
          <source src="https://rintaro383.github.io/alligator.mp3" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
      </div>
    </div>
  </section>

  <section class="animal-section" id="B">
    <h2>B - Bear</h2>
    <div class="animal-grid">
      <p>Bear</p>
      <img src="https://rintaro383.github.io/bear.jpg" alt="Bear">
      <div>
        <p>Under Construction</p>
      </div>
    </div>
  </section>

  <section class="animal-section" id="C">
    <h2>C - Cat</h2>
    <div class="animal-grid">
      <p>Cat</p>
      <img src="https://rintaro383.github.io/cat.jpg" alt="Cat">
      <div>
        <p>Under Construction</p>
      </div>
    </div>
  </section>

  <section class="animal-section" id="D">
    <h2>D - Dolphin</h2>
    <div class="animal-grid">
      <p>Dolphin</p>
      <img src="https://rintaro383.github.io/dolphin.jpg" alt="Dolphin">
      <div>
        <p>Under Construction</p>
      </div>
    </div>
  </section>

  <section class="animal-section" id="E">
    <h2>E - Elephant</h2>
    <div class="animal-grid">
      <p>Elephant</p>
      <img src="https://rintaro383.github.io/elephant.jpg" alt="Elephant">
      <div>
        <p>Under Construction</p>
      </div>
    </div>
  </section>

  <div id="back-to-top">
    <a href="#top">Back to Top</a>
  </div>

</body>
</html>
