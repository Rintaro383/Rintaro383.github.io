<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Pyramid</title>
</head>
<body>

  <table border="1">
    <caption>USDA Food Pyramid</caption>
    <thead>
      <tr>
        <th>Food Group</th>
        <th>2005-2010</th>
        <th>2011-present</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Dairy (milk, yogurt, cheese)</td>
        <td>2-3</td>
        <td>3-4</td>
      </tr>
      <tr>
        <td>Meat and Beans (beef, poultry, fish, beans)</td>
        <td>2-3</td>
        <td>5-6</td>
      </tr>
      <tr>
        <td>Fruits</td>
        <td>2-4</td>
        <td>2-4</td>
      </tr>
      <tr>
        <td>Vegetables</td>
        <td>3-5</td>
        <td>1-2</td>
      </tr>
      <tr>
        <td>Grains (bread, donuts, pop tarts)</td>
        <td>1-2</td>
        <td>3-5</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
