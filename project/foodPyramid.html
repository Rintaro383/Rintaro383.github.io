<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Pyramid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    table {
      border-collapse: collapse;
      margin: 0 auto;
      padding: 10px;
    }

    caption {
      font-size: 1.5em;
      font-weight: bold;
      background-color: green;
      color: white;
      padding: 10px;
    }

    th, td {
      border: 1px solid #333;
      padding: 10px 20px;
      text-align: center;
    }

    thead tr {
      background-color: green;
      color: white;
    }
  </style>
</head>
<body>

  <table>
    <caption>USDA Food Pyramid</caption>
    <thead>
      <tr>
        <th>Food Group</th>
        <th>2005-2010</th>
        <th>2011-present</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Dairy<br>(milk, yogurt, cheese)</td>
        <td>2-3</td>
        <td>3-4</td>
      </tr>
      <tr>
        <td>Meat and Beans<br>(beef, poultry, fish, beans)</td>
        <td>2-3</td>
        <td>5-6</td>
      </tr>
      <tr>
        <td>Fruits</td>
        <td>2-4</td>
        <td>2-4</td>
      </tr>
      <tr>
        <td>Vegetables</td>
        <td>3-5</td>
        <td>1-2</td>
      </tr>
      <tr>
        <td>Grains<br>(bread, donuts, pop tarts)</td>
        <td>1-2</td>
        <td>3-5</td>
      </tr>
    </tbody>
  </table>

</body>
</html>
